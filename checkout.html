<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - WANZ SHOP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .checkout-page {
            padding: 120px 0 var(--spacing-3xl);
            min-height: 100vh;
        }
        
        .checkout-container {
            max-width: 560px;
            margin: 0 auto;
        }
        
        .checkout-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
        }
        
        .checkout-card h1 {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            margin-bottom: var(--spacing-lg);
            text-align: center;
        }
        
        .checkout-item {
            display: flex;
            justify-content: space-between;
            padding: var(--spacing-md) 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .checkout-item:last-of-type {
            border-bottom: none;
        }
        
        .checkout-item .item-name {
            color: var(--text-secondary);
        }
        
        .checkout-item .item-price {
            font-weight: 600;
        }
        
        .checkout-total {
            display: flex;
            justify-content: space-between;
            padding: var(--spacing-lg) 0;
            border-top: 2px solid var(--border-color);
            margin-top: var(--spacing-sm);
        }
        
        .checkout-total .total-label {
            font-size: var(--font-size-lg);
            font-weight: 700;
        }
        
        .checkout-total .total-price {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--accent-gold);
        }
        
        .checkout-actions {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }
        
        .checkout-actions .btn-primary {
            width: 100%;
            justify-content: center;
            font-size: var(--font-size-lg);
            padding: 16px;
        }
        
        .checkout-actions .btn-secondary {
            width: 100%;
            justify-content: center;
            font-size: var(--font-size-md);
            padding: 14px;
        }
        
        .checkout-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40vh;
            color: var(--text-secondary);
        }
        
        .checkout-loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-rose);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: var(--spacing-lg);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .checkout-empty {
            text-align: center;
            padding: var(--spacing-2xl) 0;
        }
        
        .checkout-empty h2 {
            font-size: var(--font-size-xl);
            margin-bottom: var(--spacing-md);
        }
        
        .checkout-empty p {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-text">WANZ</span>
                <span class="logo-shop">SHOP</span>
            </a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Checkout -->
    <section class="checkout-page">
        <div class="container">
            <div class="checkout-container" id="checkoutContent">
                <div class="checkout-loading">
                    <div class="spinner"></div>
                    <p>Loading checkout...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <span class="logo-text">WANZ</span>
                    <span class="logo-shop">SHOP</span>
                    <p class="footer-desc">Premium digital products for everyone</p>
                </div>
                <div class="footer-links">
                    <a href="index.html">Home</a>
                    <a href="index.html#products">Products</a>
                    <a href="index.html#about">About</a>
                    <a href="index.html#contact">Contact</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 WANZ SHOP. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script type="module">
        import { CONFIG } from './js/config.js';
        import { db, doc, getDoc } from './js/firebase-init.js';
        
        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const checkoutContent = document.getElementById('checkoutContent');
        
        // Format price
        function formatPrice(price) {
            if (!price && price !== 0) return 'Rp 0';
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(price);
        }
        
        // Load checkout
        async function loadCheckout() {
            if (!productId) {
                checkoutContent.innerHTML = `
                    <div class="checkout-card">
                        <h1>Checkout</h1>
                        <div class="checkout-empty">
                            <h2>No Product Selected</h2>
                            <p>Please select a product to checkout.</p>
                            <a href="index.html#products" class="btn-primary">Browse Products</a>
                        </div>
                    </div>
                `;
                return;
            }
            
            try {
                const productRef = doc(db, CONFIG.COLLECTIONS.PRODUCTS, productId);
                const docSnap = await getDoc(productRef);
                
                if (!docSnap.exists()) {
                    checkoutContent.innerHTML = `
                        <div class="checkout-card">
                            <h1>Checkout</h1>
                            <div class="checkout-empty">
                                <h2>Product Not Found</h2>
                                <p>The product you selected doesn't exist or has been removed.</p>
                                <a href="index.html#products" class="btn-primary">Browse Products</a>
                            </div>
                        </div>
                    `;
                    return;
                }
                
                const product = { id: docSnap.id, ...docSnap.data() };
                const price = product.price || 0;
                
                checkoutContent.innerHTML = `
                    <div class="checkout-card fade-in">
                        <h1>Checkout</h1>
                        <div class="checkout-item">
                            <span class="item-name">${product.name || 'Untitled Product'}</span>
                            <span class="item-price">${formatPrice(price)}</span>
                        </div>
                        <div class="checkout-total">
                            <span class="total-label">Total</span>
                            <span class="total-price">${formatPrice(price)}</span>
                        </div>
                        <div class="checkout-actions">
                            <a href="payment.html?id=${product.id}" class="btn-primary">Lanjut Pembayaran</a>
                            <a href="product-detail.html?id=${product.id}" class="btn-secondary">Kembali</a>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                console.error('Error loading checkout:', error);
                checkoutContent.innerHTML = `
                    <div class="checkout-card">
                        <h1>Checkout</h1>
                        <div class="checkout-empty">
                            <h2>Error Loading Checkout</h2>
                            <p>${error.message || 'Something went wrong. Please try again.'}</p>
                            <a href="index.html#products" class="btn-primary">Browse Products</a>
                        </div>
                    </div>
                `;
            }
        }
        
        // Mobile nav toggle
        document.querySelector('.nav-toggle')?.addEventListener('click', () => {
            document.querySelector('.nav-toggle')?.classList.toggle('active');
            document.querySelector('.nav-links')?.classList.toggle('active');
        });
        
        // Load checkout
        loadCheckout();
    </script>
</body>
</html>

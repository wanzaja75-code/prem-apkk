<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment - WANZ SHOP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .payment-page {
            padding: 120px 0 var(--spacing-3xl);
            min-height: 100vh;
        }
        
        .payment-container {
            max-width: 560px;
            margin: 0 auto;
        }
        
        .payment-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            text-align: center;
        }
        
        .payment-card h1 {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
        }
        
        .payment-card .subtitle {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xl);
        }
        
        .qris-container {
            background: white;
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
            display: inline-block;
        }
        
        .qris-container img {
            max-width: 280px;
            height: auto;
            display: block;
        }
        
        .payment-methods {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-xl);
        }
        
        .payment-methods .method-badge {
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }
        
        .payment-actions .btn-primary {
            width: 100%;
            justify-content: center;
            font-size: var(--font-size-lg);
            padding: 16px;
        }
        
        .payment-actions .btn-secondary {
            width: 100%;
            justify-content: center;
            font-size: var(--font-size-md);
            padding: 14px;
            margin-top: var(--spacing-sm);
        }
        
        .payment-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40vh;
            color: var(--text-secondary);
        }
        
        .payment-loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-rose);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: var(--spacing-lg);
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .payment-error {
            text-align: center;
            padding: var(--spacing-2xl) 0;
        }
        
        .payment-error h2 {
            font-size: var(--font-size-xl);
            margin-bottom: var(--spacing-md);
        }
        
        .payment-error p {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
        }
        
        .qris-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            border: 2px dashed var(--border-color);
            color: var(--text-secondary);
        }
        
        .qris-placeholder .icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
        }
        
        .form-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
        }
        
        .form-overlay.active {
            display: flex;
        }
        
        .form-modal {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .form-modal h2 {
            font-size: var(--font-size-xl);
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            text-align: center;
        }
        
        .form-modal .modal-subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: var(--spacing-lg);
        }
        
        .form-modal .form-group {
            margin-bottom: var(--spacing-md);
        }
        
        .form-modal label {
            display: block;
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xs);
        }
        
        .form-modal input,
        .form-modal textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-primary);
            font-size: var(--font-size-md);
            transition: border-color var(--transition-fast);
        }
        
        .form-modal input:focus,
        .form-modal textarea:focus {
            outline: none;
            border-color: var(--accent-rose);
        }
        
        .form-modal textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-modal .form-actions {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }
        
        .form-modal .form-actions .btn-primary,
        .form-modal .form-actions .btn-secondary {
            flex: 1;
            justify-content: center;
        }
        
        @media (max-width: 480px) {
            .qris-container img {
                max-width: 200px;
            }
            
            .form-modal {
                padding: var(--spacing-md);
            }
            
            .form-modal .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-text">WANZ</span>
                <span class="logo-shop">SHOP</span>
            </a>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- Payment -->
    <section class="payment-page">
        <div class="container">
            <div class="payment-container" id="paymentContent">
                <div class="payment-loading">
                    <div class="spinner"></div>
                    <p>Loading payment...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Confirmation Form Overlay -->
    <div class="form-overlay" id="confirmOverlay">
        <div class="form-modal">
            <h2>Konfirmasi Pembayaran</h2>
            <p class="modal-subtitle">Silakan isi data Anda untuk konfirmasi</p>
            <form id="confirmForm">
                <div class="form-group">
                    <label for="customerName">Nama Lengkap *</label>
                    <input type="text" id="customerName" placeholder="Nama Anda" required />
                </div>
                <div class="form-group">
                    <label for="buktiTransfer">Upload Bukti Transfer *</label>
                    <input type="file" id="buktiTransfer" accept="image/*" required />
                </div>
                <div id="formError" style="color: var(--accent-rose); font-size: var(--font-size-sm); margin-bottom: var(--spacing-md); display: none;"></div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Konfirmasi via WhatsApp</button>
                    <button type="button" id="closeForm" class="btn-secondary">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <span class="logo-text">WANZ</span>
                    <span class="logo-shop">SHOP</span>
                    <p class="footer-desc">Premium digital products for everyone</p>
                </div>
                <div class="footer-links">
                    <a href="index.html">Home</a>
                    <a href="index.html#products">Products</a>
                    <a href="index.html#about">About</a>
                    <a href="index.html#contact">Contact</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 WANZ SHOP. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script type="module">
        import { CONFIG } from './js/config.js';
        import { db, doc, getDoc, collection, getDocs } from './js/firebase-init.js';
        
        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const paymentContent = document.getElementById('paymentContent');
        
        // DOM refs for form
        const overlay = document.getElementById('confirmOverlay');
        const confirmForm = document.getElementById('confirmForm');
        const closeFormBtn = document.getElementById('closeForm');
        const customerNameInput = document.getElementById('customerName');
        const buktiTransferInput = document.getElementById('buktiTransfer');
        const formError = document.getElementById('formError');
        
        let currentProduct = null;
        let qrisUrl = null;
        
        // Format price
        function formatPrice(price) {
            if (!price && price !== 0) return 'Rp 0';
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(price);
        }
        
        // Get QRIS from Firestore
        async function getQRIS() {
            try {
                const settingsRef = doc(db, CONFIG.COLLECTIONS.SETTINGS, 'qris');
                const docSnap = await getDoc(settingsRef);
                if (docSnap.exists()) {
                    return docSnap.data().url;
                }
                return null;
            } catch (error) {
                console.error('Error getting QRIS:', error);
                return null;
            }
        }
        
        // Get WhatsApp number from Firestore
        async function getWhatsApp() {
            try {
                const settingsRef = doc(db, CONFIG.COLLECTIONS.SETTINGS, 'whatsapp');
                const docSnap = await getDoc(settingsRef);
                if (docSnap.exists()) {
                    return docSnap.data().number;
                }
                return CONFIG.WHATSAPP_NUMBER;
            } catch (error) {
                console.error('Error getting WhatsApp:', error);
                return CONFIG.WHATSAPP_NUMBER;
            }
        }
        
        // Load payment page
        async function loadPayment() {
            if (!productId) {
                paymentContent.innerHTML = `
                    <div class="payment-card">
                        <h1>Payment</h1>
                        <div class="payment-error">
                            <h2>No Product Selected</h2>
                            <p>Please select a product to proceed with payment.</p>
                            <a href="index.html#products" class="btn-primary">Browse Products</a>
                        </div>
                    </div>
                `;
                return;
            }
            
            try {
                // Load product
                const productRef = doc(db, CONFIG.COLLECTIONS.PRODUCTS, productId);
                const docSnap = await getDoc(productRef);
                
                if (!docSnap.exists()) {
                    paymentContent.innerHTML = `
                        <div class="payment-card">
                            <h1>Payment</h1>
                            <div class="payment-error">
                                <h2>Product Not Found</h2>
                                <p>The product you selected doesn't exist or has been removed.</p>
                                <a href="index.html#products" class="btn-primary">Browse Products</a>
                            </div>
                        </div>
                    `;
                    return;
                }
                
                currentProduct = { id: docSnap.id, ...docSnap.data() };
                
                // Load QRIS
                qrisUrl = await getQRIS();
                
                // Load WhatsApp number
                const whatsapp = await getWhatsApp();
                
                // Render payment
                paymentContent.innerHTML = `
                    <div class="payment-card fade-in">
                        <h1>Pembayaran</h1>
                        <p class="subtitle">Scan QRIS untuk menyelesaikan pembayaran</p>
                        
                        <div class="qris-container">
                            ${qrisUrl ? 
                                `<img src="${qrisUrl}" alt="QRIS Code" />` :
                                `<div class="qris-placeholder">
                                    <span class="icon">📱</span>
                                    <p>QRIS belum diupload oleh admin</p>
                                </div>`
                            }
                        </div>
                        
                        <p style="color: var(--text-secondary); margin-bottom: var(--spacing-sm);">
                            Dukung pembayaran melalui QRIS.
                        </p>
                        <div class="payment-methods">
                            <span class="method-badge">DANA</span>
                            <span class="method-badge">OVO</span>
                            <span class="method-badge">GoPay</span>
                            <span class="method-badge">ShopeePay</span>
                            <span class="method-badge">Mobile Banking</span>
                        </div>
                        
                        <div class="payment-actions">
                            <button id="confirmPaymentBtn" class="btn-primary">Saya Sudah Transfer</button>
                            <a href="checkout.html?id=${productId}" class="btn-secondary">Kembali ke Checkout</a>
                        </div>
                    </div>
                `;
                
                // Set up confirm button
                document.getElementById('confirmPaymentBtn')?.addEventListener('click', () => {
                    overlay.classList.add('active');
                });
                
            } catch (error) {
                console.error('Error loading payment:', error);
                paymentContent.innerHTML = `
                    <div class="payment-card">
                        <h1>Payment</h1>
                        <div class="payment-error">
                            <h2>Error Loading Payment</h2>
                            <p>${error.message || 'Something went wrong. Please try again.'}</p>
                            <a href="index.html#products" class="btn-primary">Browse Products</a>
                        </div>
                    </div>
                `;
            }
        }
        
        // Handle confirm form submission
        async function handleConfirm(e) {
            e.preventDefault();
            
            const name = customerNameInput.value.trim();
            const file = buktiTransferInput.files[0];
            
            if (!name) {
                formError.textContent = 'Nama lengkap wajib diisi.';
                formError.style.display = 'block';
                return;
            }
            
            if (!file) {
                formError.textContent = 'Bukti transfer wajib diupload.';
                formError.style.display = 'block';
                return;
            }
            
            formError.style.display = 'none';
            
            // Get WhatsApp number
            const whatsapp = await getWhatsApp();
            const productName = currentProduct?.name || 'Produk';
            const price = currentProduct?.price || 0;
            const formattedPrice = formatPrice(price);
            
            // Build WhatsApp message
            const message = `Halo Admin WANZ SHOP 👋

Saya sudah melakukan pembayaran.

Nama : ${name}
Produk : ${productName}
Harga : ${formattedPrice}

Bukti transfer sudah saya lampirkan.

Mohon diproses.`;
            
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${whatsapp}?text=${encodedMessage}`;
            
            // Open WhatsApp
            window.open(whatsappUrl, '_blank');
            
            // Close overlay
            overlay.classList.remove('active');
            
            // Reset form
            confirmForm.reset();
        }
        
        // Mobile nav toggle
        document.querySelector('.nav-toggle')?.addEventListener('click', () => {
            document.querySelector('.nav-toggle')?.classList.toggle('active');
            document.querySelector('.nav-links')?.classList.toggle('active');
        });
        
        // Form events
        confirmForm.addEventListener('submit', handleConfirm);
        closeFormBtn.addEventListener('click', () => {
            overlay.classList.remove('active');
            confirmForm.reset();
            formError.style.display = 'none';
        });
        
        // Close overlay on outside click
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.classList.remove('active');
                confirmForm.reset();
                formError.style.display = 'none';
            }
        });
        
        // Load payment
        loadPayment();
    </script>
</body>
</html>
